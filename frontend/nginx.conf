# ============================================================================
# Frontend — Nginx Configuration (Production SPA Serving)
# ============================================================================
# Optimized for serving a React/Vite single-page application:
#   - Gzip compression for faster transfers
#   - Cache headers for hashed static assets (JS, CSS, images)
#   - SPA fallback: all non-file routes redirect to index.html
#   - Security headers for hardened production deployment
# ============================================================================

server {
    listen       80;
    server_name  localhost;

    # --------------- Document Root ---------------
    root   /usr/share/nginx/html;
    index  index.html;

    # --------------- Gzip Compression ---------------
    # Compress text-based assets to reduce transfer size by ~70%
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # --------------- Static Asset Caching ---------------
    # Vite produces hashed filenames (e.g., index-abc123.js), so we can
    # cache them aggressively — the hash changes on every rebuild.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --------------- SPA Routing Fallback ---------------
    # For any route that doesn't match a physical file, serve index.html
    # so React Router can handle client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --------------- Security Headers ---------------
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # --------------- Error Pages ---------------
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
